name: FocusApp

options:
  bundleIdPrefix: com.example
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.1"

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "18.1"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

targets:
  FocusApp:
    type: application
    platform: iOS
    deploymentTarget: "18.1"

    # Source files live in the existing Swift Playground directory so a
    # single source of truth powers both the .swiftpm (for iPad Playgrounds
    # development) and this Xcode project (for signed / App Store builds).
    sources:
      - path: ../FocusApp.swiftpm/Sources/App
        name: App

    resources:
      - path: Resources/Assets.xcassets

    dependencies:
      - package: ZIPFoundation

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "2"   # iPad only; runs on M-series Macs via 'Designed for iPad'
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Resources/FocusApp.entitlements
        # Platforms for SwiftUI previews / Xcode build-for-running. Keep iOS
        # only to match .swiftpm; macOS native support would need a separate
        # target or SUPPORTS_MACCATALYST.
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Focus Check
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIDeviceFamily:
          - 2   # iPad
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - metal
        # Usage descriptions surface in system prompts. SCA's key is what
        # unlocks the framework on signed builds (plus the user enabling
        # Communication Safety on iOS / Sensitive Content Warning on macOS).
        NSPhotoLibraryUsageDescription: "Focus Check reads selected photos' metadata (filename, EXIF) and may query the Photos library for the original asset filename."
        NSSensitiveContentAnalysisUsageDescription: "Focus Check uses on-device Sensitive Content Analysis to flag and optionally mosaic sensitive imagery before it's displayed."
